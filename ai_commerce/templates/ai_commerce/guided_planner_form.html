{% extends 'ecommerce/base_store.html' %}
{% block title %}Guided Shopping Planner{% endblock %}
{% block content %}
<div class="auth-card">
    <h2>Guided Shopping Planner</h2>
    <p class="subtitle">Answer a few quick questions and we'll build a basket for you.</p>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Budget (optional, in Le)</label>
            <input type="number" name="budget" step="0.01" min="0">
        </div>
        <div class="form-group">
            <label>Family size</label>
            <input type="number" name="family_size" min="1" value="1">
        </div>
        <div class="form-group">
            <label>Shopping purpose</label>
            <input type="text" name="shopping_purpose" placeholder="e.g. weekly groceries, hosting guests">
        </div>
        <div class="form-group">
            <label>Quality preference</label>
            <select name="quality_preference">
                <option value="standard">Standard</option>
                <option value="budget">Budget</option>
                <option value="premium">Premium</option>
            </select>
        </div>
        <button type="submit" class="btn-primary-modern" style="width:100%;padding:0.7rem;">Get Recommendations</button>
    </form>
</div>
{% endblock %}

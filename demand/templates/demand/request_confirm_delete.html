{% extends 'base.html' %}
{% block title %}Delete Request{% endblock %}
{% block page_title %}Delete Request{% endblock %}

{% block content %}
<div style="max-width:500px; margin:60px auto;">
    <div class="card" style="border-top:4px solid var(--danger);">
        <div class="card-body" style="text-align:center; padding:40px;">
            <div style="width:64px; height:64px; background:#FEF2F2; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
                <i class="bi bi-trash" style="font-size:28px; color:var(--danger);"></i>
            </div>
            <h3 style="font-size:18px; font-weight:700; margin-bottom:8px;">Delete Request</h3>
            <p style="color:var(--text-muted); font-size:14px; margin-bottom:24px;">
                Are you sure you want to delete the request for <strong>{{ request_obj.product_name_requested }}</strong>?
            </p>
            <form method="POST" style="display:flex; gap:10px; justify-content:center;">
                {% csrf_token %}
                <button type="submit" class="btn-danger-modern" style="padding:10px 24px; font-size:14px;">
                    <i class="bi bi-trash"></i> Yes, Delete
                </button>
                <a href="{% url 'request_list' %}" class="btn-secondary-modern">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}

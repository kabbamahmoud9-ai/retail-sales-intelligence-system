{% extends 'ecommerce/base_store.html' %}
{% block title %}Customer Login{% endblock %}

{% block content %}
<div class="auth-card">
    <h2>Welcome Back</h2>
    <p class="subtitle">Log in to your store account</p>

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="your@email.com" autofocus>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required placeholder="Your password">
        </div>
        <button type="submit" class="btn-primary-modern" style="width:100%; padding:0.75rem; margin-top:0.5rem;">
            Login
        </button>
    </form>
    <p style="text-align:center; margin-top:1.25rem; font-size:0.9rem; color:var(--text-muted);">
        New customer? <a href="{% url 'ecommerce:register' %}" style="color:var(--primary-color);">Create an account</a>
    </p>
</div>
{% endblock %}

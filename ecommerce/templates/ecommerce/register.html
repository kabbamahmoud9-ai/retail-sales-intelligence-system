{% extends 'ecommerce/base_store.html' %}
{% block title %}Create Account{% endblock %}

{% block content %}
<div class="auth-card">
    <h2>Create Account</h2>
    <p class="subtitle">Shop online and track your orders</p>

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Full Name *</label>
            <input type="text" name="full_name" required placeholder="e.g. Aminata Koroma">
        </div>
        <div class="form-group">
            <label>Email Address *</label>
            <input type="email" name="email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="phone" placeholder="+232 76 000 000">
        </div>
        <div class="form-group">
            <label>Default Delivery Address</label>
            <textarea name="address" rows="2" placeholder="Street, neighbourhood, city"></textarea>
        </div>
        <div class="form-group">
            <label>Password *</label>
            <input type="password" name="password" required placeholder="At least 6 characters">
        </div>
        <div class="form-group">
            <label>Confirm Password *</label>
            <input type="password" name="password2" required placeholder="Repeat password">
        </div>
        <button type="submit" class="btn-primary-modern" style="width:100%; padding:0.75rem; margin-top:0.5rem;">
            Create Account
        </button>
    </form>
    <p style="text-align:center; margin-top:1.25rem; font-size:0.9rem; color:var(--text-muted);">
        Already have an account? <a href="{% url 'ecommerce:login' %}" style="color:var(--primary-color);">Login here</a>
    </p>
</div>
{% endblock %}

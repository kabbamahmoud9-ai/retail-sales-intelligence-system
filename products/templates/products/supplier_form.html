{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div style="max-width: 500px;">
    <div class="card">
        <div class="card-header"><h5>{{ title }}</h5></div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                <div class="form-group">
                    <label class="form-label-modern">{{ field.label }}</label>
                    {{ field }}
                </div>
                {% endfor %}
                <div style="display:flex; gap:10px; margin-top:8px;">
                    <button type="submit" class="btn-primary-modern"><i class="bi bi-check-lg"></i> Save</button>
                    <a href="{% url 'supplier_list' %}" class="btn-secondary-modern">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
